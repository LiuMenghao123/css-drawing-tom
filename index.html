<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>CSS Art | Tom Cat's Smug Grin</title>
</head>
<body>
    <div class="room">
        <div class="floor"></div>
        <div class="mouse-hole"></div>
    </div>
    <div class="canvas">
        <div class="shadow-ground"></div>
        <div class="tom-head">
            <div class="ears">
                <div class="ear left"></div>
                <div class="ear right"></div>
            </div>
            <div class="face">
                <div class="white-patch"></div>
                <div class="eyes">
                    <div class="eye left"><div class="pupil"></div></div>
                    <div class="eye right"><div class="pupil"></div></div>
                </div>
                <div class="eyebrows">
                    <div class="brow left"></div>
                    <div class="brow right"></div>
                </div>
                <div class="nose"></div>
                <div class="muzzle">
                    <div class="dot-group left">
                        <span></span><span></span><span></span>
                    </div>
                    <div class="dot-group right">
                        <span></span><span></span><span></span>
                    </div>
                </div>
                <div class="mouth-smug">
                    <div class="grin-line"></div>
                    <div class="smug-cheek"></div>
                </div>
                <div class="whiskers">
                    <div class="w-left"><span></span><span></span><span></span></div>
                    <div class="w-right"><span></span><span></span><span></span></div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
